<title>Comunicados — Suprema</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --red: #e60000;
    --red-glow: rgba(230,0,0,.35);
    --red-text: #ff5555;
    --glass-border: rgba(255,255,255,.09);
    --text: #e8e8ec;
    --text2: rgba(255,255,255,.5);
    --text3: rgba(255,255,255,.28);
    --radius: 22px;
    --radius-sm: 14px;
    --font: 'Plus Jakarta Sans', system-ui, sans-serif;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.5;
    overflow-x: hidden;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: .4;
  }
  .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .ambient .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: .5; }
  .ambient .orb.r { width: 500px; height: 500px; top: -10%; right: -5%; background: radial-gradient(circle, rgba(230,0,0,.1), transparent 70%); }
  .ambient .orb.g { width: 600px; height: 600px; bottom: -15%; left: -10%; background: radial-gradient(circle, rgba(40,40,50,.4), transparent 70%); }

  /* ── HOME ─────────────────────────────────────── */
  #homeScreen { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 0 20px 60px; }
  .home-header { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 56px 0 44px; text-align: center; }
  .home-logo { width: 80px; height: 80px; border-radius: 18px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .home-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .home-title { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
  .home-sub { font-size: 13px; color: var(--text2); max-width: 460px; line-height: 1.6; }
  .templates-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 8px; }
  @media(max-width:680px) { .templates-grid { grid-template-columns: 1fr; } }
  .tpl-card {
    background: linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    border: 1px solid rgba(230,0,0,.2);
    border-radius: 20px;
    padding: 24px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    cursor: pointer;
    transition: all .25s;
  }
  .tpl-card:hover { transform: translateY(-4px); border-color: rgba(230,0,0,.45); box-shadow: 0 12px 40px rgba(230,0,0,.15); }
  .tpl-icon { width: 44px; height: 44px; border-radius: 13px; background: linear-gradient(135deg, rgba(230,0,0,.25), rgba(230,0,0,.1)); border: 1px solid rgba(230,0,0,.25); display: flex; align-items: center; justify-content: center; }
  .tpl-icon svg { width: 22px; height: 22px; color: var(--red); }
  .tpl-title { font-size: 15px; font-weight: 700; color: #fff; }
  .tpl-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }

  /* ── EDITOR ───────────────────────────────────── */
  #editorScreen { display: none; position: relative; z-index: 1; padding: 16px 20px 60px; }
  .editor-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
  }
  .editor-toolbar-left { display: flex; align-items: center; gap: 12px; }
  .editor-title { font-size: 14px; font-weight: 700; color: #fff; }
  .editor-title .doc-name { color: var(--text2); font-weight: 500; }
  .btn-back { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 8px 16px; color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all .2s; }
  .btn-back:hover { background: rgba(255,255,255,.09); color: #fff; }
  .btn-export { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 12px; border: none; background: linear-gradient(135deg, #e60000, #c00); color: #fff; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; cursor: pointer; font-family: var(--font); box-shadow: 0 4px 20px var(--red-glow); transition: all .3s; }
  .btn-export:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--red-glow); }
  .btn-export:disabled { opacity: .6; cursor: wait; }

  .editor-grid {
    display: grid;
    grid-template-columns: 240px 1fr 320px;
    gap: 16px;
    min-height: calc(100vh - 100px);
  }
  @media(max-width:1100px) {
    .editor-grid { grid-template-columns: 200px 1fr 280px; }
  }
  @media(max-width:900px) {
    .editor-grid { grid-template-columns: 1fr; }
    .editor-col { max-height: none !important; }
  }
  .editor-col {
    background: linear-gradient(160deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 14px;
    overflow-y: auto;
    max-height: calc(100vh - 100px);
  }
  .col-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }

  /* Lista de páginas */
  .pages-list { display: flex; flex-direction: column; gap: 8px; }
  .page-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: rgba(0,0,0,.25);
    border: 1px solid rgba(255,255,255,.05);
    border-radius: 10px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
  }
  .page-item:hover { background: rgba(0,0,0,.4); border-color: rgba(255,255,255,.1); }
  .page-item.active { border-color: rgba(230,0,0,.4); background: rgba(230,0,0,.08); }
  .page-item .page-num { font-size: 10px; font-weight: 700; color: var(--text3); min-width: 18px; }
  .page-item.active .page-num { color: var(--red-text); }
  .page-item .page-name { font-size: 12px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .page-item .page-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  .page-item:hover .page-actions, .page-item.active .page-actions { opacity: 1; }
  .page-item .ico-btn {
    width: 22px; height: 22px; border-radius: 6px; border: none;
    background: rgba(255,255,255,.05);
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: all .15s;
  }
  .page-item .ico-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
  .page-item .ico-btn.del:hover { background: rgba(230,0,0,.25); color: #ff8888; }
  .btn-add-page {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px dashed rgba(230,0,0,.3);
    background: rgba(230,0,0,.05);
    color: var(--red-text);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: all .15s;
  }
  .btn-add-page:hover { background: rgba(230,0,0,.12); border-color: rgba(230,0,0,.5); }

  /* Preview central */
  .preview-wrap { display: flex; align-items: flex-start; justify-content: center; padding: 20px 0; width: 100%; }
  .preview-page-num { font-size: 11px; color: var(--text3); margin-bottom: 8px; text-align: center; letter-spacing: 1px; }
  .preview-stage { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 640px; }
  #previewArea { width: 100%; display: flex; justify-content: center; }

  /* Inspector direito */

  .inspector-block + .inspector-block { margin-top: 10px; }
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .field-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; display: block; }
  input[type="text"], input[type="number"], select, textarea {

    background: rgba(0,0,0,.3);

    padding: 10px 12px;
    color: #fff;

    font-family: var(--font);

  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  input:focus, select:focus, textarea:focus { border-color: rgba(230,0,0,.25); box-shadow: 0 0 0 3px rgba(230,0,0,.06); }
  input::placeholder, textarea::placeholder { color: rgba(255,255,255,.18); font-weight: 300; }

  .item-row {
    background: rgba(0,0,0,.25);
    border: 1px solid rgba(255,255,255,.04);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 8px;
  }
  .item-row-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .item-row-num { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
  .btn-mini {
    background: rgba(230,0,0,.1);
    border: 1px solid rgba(230,0,0,.25);
    border-radius: 6px;
    color: var(--red-text);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    cursor: pointer;
    font-family: var(--font);
  }
  .btn-mini:hover { background: rgba(230,0,0,.2); }
  .btn-add-item {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px dashed rgba(230,0,0,.3);
    background: transparent;
    color: var(--red-text);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    margin-top: 4px;
  }
  .btn-add-item:hover { background: rgba(230,0,0,.07); }

  /* Modal seletor de bloco */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.show { display: flex; }
  .modal-card {

    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    transition: all .2s;

  .block-card:hover { background: rgba(230,0,0,.08); border-color: rgba(230,0,0,.3); }

    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
    margin-top: 18px;
  }
  .modal-close:hover { background: rgba(255,255,255,.09); color: #fff; }

  /* ── PÁGINA A4 (preview e export) ────────────── */
  /* A4 portrait: 210x297mm, proporção 1:1.414 */
  .a4-page {
    width: 100%;
    max-width: 620px;
    aspect-ratio: 210/297;
    background: #0a0a0a;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 12px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
    color: #fff;
    font-family: var(--font);
    container-type: inline-size;
  }
  /* Container interno da página com padding consistente */
  .a4-inner {
    position: absolute;
    inset: 0;
    padding: 7cqw;
    display: flex;
    flex-direction: column;
    color: #fff;
  }

  /* Fundo fixo do comunicado: faixa vermelha diagonal */
  .a4-bg-fixed {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  /* Footer: assinatura ATENCIOSAMENTE */
  .a4-footer-sign {
    position: absolute;
    left: 7%;
    bottom: 6%;
    z-index: 4;
  }
  .a4-footer-sign .at { font-size: 1.6cqw; letter-spacing: 2px; color: rgba(255,255,255,.85); font-weight: 600; margin-bottom: 4px; }
  .a4-footer-sign .name { font-size: 2.3cqw; font-weight: 800; letter-spacing: -.3px; color: #fff; }

  /* Logo Suprema branca completa top-left (opcional por bloco) */
  .a4-logo-top { position: relative; z-index: 3; margin-bottom: 5cqw; max-width: 38%; }
  .a4-logo-top img { width: 100%; height: auto; display: block; }

  /* Conteúdo principal da página */
  .a4-content { flex: 1; display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 3; }

  /* Tipografia padrão do conteúdo */
  .a4-h1 {
    font-size: 7.5cqw;
    font-weight: 800;
    line-height: .98;
    letter-spacing: -1.5px;
    text-transform: uppercase;
    color: #fff;
    margin: 0 0 5%;
  }
  .a4-h1 .accent { color: #fff; }
  .a4-p {
    font-size: 1.8cqw;
    line-height: 1.65;
    color: rgba(255,255,255,.92);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .3px;
    margin: 0 0 3%;
    text-align: justify;
  }
  .a4-p.normal-case { text-transform: none; letter-spacing: 0; font-weight: 500; }

  /* Bullet (• item) */
  .a4-bullet { display: flex; gap: 1.8cqw; align-items: flex-start; margin-bottom: 1.4cqw; }
  .a4-bullet .dot { width: .8cqw; height: .8cqw; border-radius: 50%; background: #fff; margin-top: .9cqw; flex-shrink: 0; }
  .a4-bullet .txt { flex: 1; font-size: 1.7cqw; line-height: 1.5; color: rgba(255,255,255,.92); font-weight: 600; text-transform: uppercase; letter-spacing: .2px; text-align: justify; }
  .a4-bullet .txt b { color: #fff; }

  /* Numbered (1. item) */
  .a4-numbered { display: flex; gap: 1.4cqw; align-items: flex-start; margin-bottom: 2.5cqw; }
  .a4-numbered .num { font-size: 1.7cqw; font-weight: 700; color: #fff; min-width: 2.6cqw; }
  .a4-numbered .ntxt { flex: 1; font-size: 1.7cqw; line-height: 1.6; color: rgba(255,255,255,.92); font-weight: 600; text-transform: uppercase; letter-spacing: .2px; text-align: justify; }

  /* Pointer header (👉 like) */
  .a4-pointer-head { display: flex; gap: 1.4cqw; align-items: center; margin-bottom: 3cqw; }
  .a4-pointer-head .point-ico {
    width: 2.6cqw; height: 2.6cqw;
    color: #f5b400;
    flex-shrink: 0;
  }
  .a4-pointer-head .point-ico svg { width: 100%; height: 100%; }
  .a4-pointer-head .point-txt {
    font-size: 1.9cqw;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #fff;
  }

  /* Alert header (⚠️ ATENÇÃO) */
  .a4-alert-head { display: flex; gap: 1.4cqw; align-items: center; margin-bottom: 2cqw; margin-top: 1cqw; }
  .a4-alert-head .alert-ico {
    width: 2.4cqw; height: 2.4cqw;
    color: #f5a623;
    flex-shrink: 0;
  }
  .a4-alert-head .alert-ico svg { width: 100%; height: 100%; }
  .a4-alert-head .alert-txt {
    font-size: 1.8cqw;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: #fff;
  }

  /* Arrow item (➡️ blue) */
  .a4-arrow-item { display: flex; gap: 1.2cqw; align-items: flex-start; margin-bottom: 2.6cqw; padding-left: 3%; }
  .a4-arrow-item .arrow-ico {
    width: 2.2cqw; height: 2.2cqw;

    flex-shrink: 0;
    margin-top: .2cqw;

    font-size: 1.7cqw;

    text-transform: uppercase;
    letter-spacing: .2px;
    color: rgba(255,255,255,.92);
    line-height: 1.5;
  }

  /* Date block (DIA 16/02) */
  .a4-date-block { margin-bottom: 1.5cqw; }
  .a4-date-block .date-line {
    display: flex; align-items: center; gap: 1.2cqw;
    margin-bottom: 1cqw;
  }
  .a4-date-block .date-line .dot { width: .8cqw; height: .8cqw; border-radius: 50%; background: #fff; flex-shrink: 0; }
  .a4-date-block .date-line .lbl {
    font-size: 1.7cqw;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .a4-bday-name {
    font-size: 2.6cqw;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2cqw;
    text-align: center;

  .a4-bday-msg {
    font-size: 2.1cqw;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: .5px;

    text-align: center;
    margin-top: 4cqw;
  }

  .a4-photo {

  }

  /* Centro vertical (para algumas páginas) */
  .a4-content.center { justify-content: center; }
</style>

// HELPERS

function _esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function _multiline(s) {
  return _esc(s||'').replace(/\n/g,'<br>');
}
function _bold(s) {
  return _esc(s||'').replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/\n/g,'<br>');
}
function _uid() { return 'p_' + Math.random().toString(36).slice(2, 9); }

function _logoTop() {
  return `<div class="a4-logo-top"><img src="${IMG_LOGO_W}" alt="Suprema"></div>`;

  return `

}

              <button class="btn-mini" onclick="rmArrItem(${idx},'pessoas',${i})">Remover</button>
            </div>
            <div class="field" style="margin-bottom:6px"><input type="text" placeholder="Nome" value="${_esc(p.nome||'')}" oninput="updArrItem(${idx},'pessoas',${i},'nome',this.value)"></div>
            <div class="field" style="margin-bottom:6px"><input type="text" placeholder="Cidade (opcional)" value="${_esc(p.cidade||'')}" oninput="updArrItem(${idx},'pessoas',${i},'cidade',this.value)"></div>
            <input type="text" placeholder="Data (ex: 12/02)" value="${_esc(p.data||'')}" oninput="updArrItem(${idx},'pessoas',${i},'data',this.value)">
          </div>
        `).join('')}
        <button class="btn-add-item" onclick="addArrItem(${idx},'pessoas',{nome:'',cidade:'',data:''})">+ Adicionar pessoa</button>
      </div>
      <div class="inspector-block">
        <div class="field">
          <label class="field-label">Mensagem 1</label>
          <textarea oninput="updField(${idx},'mensagem1',this.value)">${_esc(d.mensagem1||'')}</textarea>
        </div>
        <div class="field">
          <label class="field-label">Mensagem 2</label>
          <textarea oninput="updField(${idx},'mensagem2',this.value)">${_esc(d.mensagem2||'')}</textarea>
        </div>
      </div>
    `,
  },

  // ─── Texto longo ────────────────────────────────────────
  texto: {
    name: 'Texto livre',
    desc: 'Parágrafos corridos com formatação',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h12"/></svg>`,
    defaults: () => ({
      mostrarLogo: false,
      conteudo: 'Primeiro parágrafo do texto.\n\nSegundo parágrafo do texto, separado por linha em branco.\n\nVocê pode usar **palavras em negrito** para destacar trechos importantes.',
    }),
    render: (d) => {
      const ps = (d.conteudo||'').split(/\n\s*\n/).filter(Boolean);
      return `
        <div class="a4-page" data-page-type="texto">
          ${_bgFixed()}
          <div class="a4-inner">
            ${d.mostrarLogo ? _logoTop() : ''}
            <div class="a4-content">
              ${ps.map(p => `<p class="a4-p">${_bold(p)}</p>`).join('')}
            </div>
            ${_signatureFooter()}
          </div>
        </div>
      `;
    },
    fields: (d, idx) => `
      <div class="inspector-block">
        <div class="field">
          <label class="field-label">Mostrar logo Suprema no topo</label>
          <select onchange="updField(${idx},'mostrarLogo',this.value==='1')">
            <option value="0" ${!d.mostrarLogo?'selected':''}>Não</option>
            <option value="1" ${d.mostrarLogo?'selected':''}>Sim</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label">Conteúdo (parágrafos separados por linha em branco)</label>
          <textarea oninput="updField(${idx},'conteudo',this.value)" style="min-height:240px">${_esc(d.conteudo||'')}</textarea>
        </div>
      </div>
    `,
  },
};

// ═══════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════
let state = {
  template: null,
  pages: [],
  selected: 0,
};

// ═══════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════
function renderHome() {
  const grid = document.getElementById('templatesGrid');
  grid.innerHTML = Object.entries(TEMPLATES).map(([key, t]) => `
    <div class="tpl-card" onclick="openTemplate('${key}')">
      <div class="tpl-icon">${t.icon}</div>
      <div class="tpl-title">${_esc(t.name)}</div>
      <div class="tpl-desc">${_esc(t.desc)}</div>
    </div>
  `).join('');
}

function openTemplate(key) {
  const tpl = TEMPLATES[key];
  if (!tpl) return;
  state.template = key;
  state.pages = tpl.pages().map(p => ({ id: _uid(), type: p.type, data: p.data }));
  state.selected = 0;
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('editorScreen').style.display = 'block';
  document.getElementById('docName').textContent = ' / ' + tpl.name;
  renderEditor();
}

function goHome() {
  document.getElementById('editorScreen').style.display = 'none';
  document.getElementById('homeScreen').style.display = 'block';
}

// ═══════════════════════════════════════════════════════════
// EDITOR
// ═══════════════════════════════════════════════════════════
function renderEditor() {
  renderPagesList();
  renderPreview();
  renderInspector();
}

function renderPagesList() {
  const list = document.getElementById('pagesList');
  list.innerHTML = state.pages.map((p, i) => {
    const block = BLOCKS[p.type];
    const name = block ? block.name : p.type;
    return `
      <div class="page-item ${i === state.selected ? 'active' : ''}" onclick="selectPage(${i})">
        <span class="page-num">${i+1}</span>
        <span class="page-name">${_esc(name)}</span>
        <span class="page-actions">
          <button class="ico-btn" onclick="event.stopPropagation();movePage(${i},-1)" title="Mover para cima">↑</button>
          <button class="ico-btn" onclick="event.stopPropagation();movePage(${i},1)" title="Mover para baixo">↓</button>
          <button class="ico-btn del" onclick="event.stopPropagation();removePage(${i})" title="Remover">×</button>
        </span>
      </div>
    `;
  }).join('');
}

function renderPreview() {
  const area = document.getElementById('previewArea');
  const idx = state.selected;
  const total = state.pages.length;
  document.getElementById('previewPageNum').textContent = `Página ${idx+1} de ${total}`;
  if (state.pages.length === 0) {
    area.innerHTML = '<div style="color:rgba(255,255,255,.3);font-size:14px;text-align:center;padding:40px">Nenhuma página. Adicione uma página clicando em "+ Adicionar página".</div>';
    return;
  }
  const p = state.pages[idx];
  if (!p) return;
  const block = BLOCKS[p.type];
  if (!block) { area.innerHTML = '<div>Bloco desconhecido</div>'; return; }
  area.innerHTML = block.render(p.data);
}

function renderInspector() {
  const area = document.getElementById('inspectorArea');
  if (state.pages.length === 0) {
    area.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:8px">Nenhuma página selecionada.</div>';
    return;
  }
  const p = state.pages[state.selected];
  if (!p) return;
  const block = BLOCKS[p.type];
  if (!block) return;
  area.innerHTML = block.fields(p.data, state.selected);
}

function selectPage(i) {
  state.selected = i;
  renderEditor();
}

function movePage(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= state.pages.length) return;
  const tmp = state.pages[i];
  state.pages[i] = state.pages[j];
  state.pages[j] = tmp;
  if (state.selected === i) state.selected = j;
  else if (state.selected === j) state.selected = i;
  renderEditor();
}

function removePage(i) {
  if (state.pages.length <= 1) {
    alert('Pelo menos uma página deve existir.');
    return;
  }
  if (!confirm('Remover esta página?')) return;
  state.pages.splice(i, 1);
  if (state.selected >= state.pages.length) state.selected = state.pages.length - 1;
  renderEditor();
}

function updField(idx, key, val) {
  if (!state.pages[idx]) return;
  state.pages[idx].data[key] = val;
  renderPreview();
  // Não re-renderiza inspector pra não perder foco
  // Exceção: campos que adicionam/removem outros campos (ex: mostrarFoto)
  if (key === 'mostrarFoto' || key === 'mostrarLogo') renderInspector();
}

function updArrItem(idx, arrKey, itemIdx, key, val) {
  if (!state.pages[idx]) return;
  if (!state.pages[idx].data[arrKey]) state.pages[idx].data[arrKey] = [];
  if (!state.pages[idx].data[arrKey][itemIdx]) state.pages[idx].data[arrKey][itemIdx] = {};
  state.pages[idx].data[arrKey][itemIdx][key] = val;
  renderPreview();
}

function addArrItem(idx, arrKey, item) {
  if (!state.pages[idx]) return;
  if (!state.pages[idx].data[arrKey]) state.pages[idx].data[arrKey] = [];
  state.pages[idx].data[arrKey].push(item);
  renderPreview();
  renderInspector();
}

function rmArrItem(idx, arrKey, itemIdx) {
  if (!state.pages[idx]) return;
  if (!state.pages[idx].data[arrKey]) return;
  state.pages[idx].data[arrKey].splice(itemIdx, 1);
  renderPreview();
  renderInspector();
}

// ═══════════════════════════════════════════════════════════
// SELETOR DE BLOCO (modal)
// ═══════════════════════════════════════════════════════════
function openBlockPicker() {
  const grid = document.getElementById('blocksGrid');
  grid.innerHTML = Object.entries(BLOCKS).map(([key, b]) => `
    <div class="block-card" onclick="addBlock('${key}')">
      <div class="b-ico">${b.icon}</div>
      <div class="b-name">${_esc(b.name)}</div>
      <div class="b-desc">${_esc(b.desc)}</div>
    </div>
  `).join('');
  document.getElementById('blockPicker').classList.add('show');
}

function closeBlockPicker() {
  document.getElementById('blockPicker').classList.remove('show');
}

function addBlock(type) {
  const block = BLOCKS[type];
  if (!block) return;
  state.pages.push({ id: _uid(), type, data: block.defaults() });
  state.selected = state.pages.length - 1;
  closeBlockPicker();
  renderEditor();
}

// ═══════════════════════════════════════════════════════════
// EXPORTAÇÃO PNG
// ═══════════════════════════════════════════════════════════
async function _renderPageToCanvas(p) {
  // Cria container offscreen com tamanho A4 fixo em px
  // A4 portrait: 1240x1754 px (proporção 210x297mm @ 150dpi)
  const W = 1240, H = 1754;
  const container = document.createElement('div');
  container.style.cssText = `position:fixed;left:-99999px;top:0;width:${W}px;height:${H}px;background:#0a0a0a;`;
  const block = BLOCKS[p.type];
  if (!block) return null;
  // Forçar a4-page a ocupar o container completo
  container.innerHTML = block.render(p.data).replace('class="a4-page"', 'class="a4-page" style="max-width:none;width:100%;height:100%;border-radius:0;box-shadow:none"');
  document.body.appendChild(container);
  await new Promise(r => setTimeout(r, 100)); // espera fontes/svg
  try {
    const canvas = await html2canvas(container.firstElementChild, {
      scale: 2,
      backgroundColor: '#0a0a0a',
      useCORS: true,
      allowTaint: true,
      logging: false,
      width: W,
      height: H,
      windowWidth: W,
      windowHeight: H,
    });
    return canvas;
  } finally {
    document.body.removeChild(container);
  }
}

function _downloadCanvas(canvas, name) {
  const link = document.createElement('a');
  link.download = name;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

async function exportCurrentPNG() {
  const btn = document.getElementById('btnExport');
  if (!state.pages[state.selected]) return;
  btn.disabled = true;
  btn.textContent = 'Gerando...';
  try {
    const canvas = await _renderPageToCanvas(state.pages[state.selected]);
    if (canvas) {
      const tplName = TEMPLATES[state.template]?.name || 'comunicado';
      _downloadCanvas(canvas, `comunicado-${_slug(tplName)}-pag${state.selected+1}.png`);
    }
  } catch (e) {
    console.error(e);
    alert('Erro ao gerar PNG: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Página atual';
  }
}

async function exportAllPNG() {
  const btn = document.getElementById('btnExportAll');
  if (state.pages.length === 0) return;
  btn.disabled = true;
  const total = state.pages.length;
  try {
    const tplName = TEMPLATES[state.template]?.name || 'comunicado';
    for (let i = 0; i < total; i++) {
      btn.textContent = `Gerando ${i+1}/${total}...`;
      const canvas = await _renderPageToCanvas(state.pages[i]);
      if (canvas) {
        _downloadCanvas(canvas, `comunicado-${_slug(tplName)}-pag${i+1}.png`);
        await new Promise(r => setTimeout(r, 300)); // delay entre downloads
      }
    }
  } catch (e) {
    console.error(e);
    alert('Erro ao gerar PNG: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Exportar tudo (PNG)';
  }
}

function _slug(s) {
  return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'comunicado';
}

  // Favicon
  const fl = document.createElement('link');

  document.head.appendChild(fl);
  // Logo home
  document.getElementById('homeLogo').src = IMG_LOGO_R;

  renderHome();
});
